version: "2.4"

services:
  database:
    image: em-database:latest
    restart: unless-stopped
    environment:
      - TZ=Europe/Rome
      - POSTGRES_PASSWORD=myPassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    mem_limit: 100m
    ports:
      - 15432:5432

volumes:
  postgres-data:
    name: postgres-data
